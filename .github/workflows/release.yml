name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: '版本号迭代方式'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 计算新版本号
        id: version
        run: |
          # 获取当前版本号（从 package.json）
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "当前版本: $CURRENT_VERSION"

          # 如果是 tag 触发，使用 tag 的版本号
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NEW_VERSION=${GITHUB_REF#refs/tags/v}
            echo "使用 tag 版本: $NEW_VERSION"
          else
            # 解析版本号
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

            # 确定迭代方式
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              BUMP_TYPE="${{ github.event.inputs.version_bump }}"
            else
              # 自动判断：检查 commit message
              COMMIT_MSG=$(git log -1 --pretty=%B)
              if echo "$COMMIT_MSG" | grep -qE "(BREAKING CHANGE|major:|\!:)"; then
                BUMP_TYPE="major"
              elif echo "$COMMIT_MSG" | grep -qE "(feat:|feature:|minor:)"; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi
            fi

            echo "迭代方式: $BUMP_TYPE"

            # 计算新版本号
            case $BUMP_TYPE in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "新版本: $NEW_VERSION"

            # 更新 package.json
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            # 更新 Cargo.toml
            sed -i "s/^version = \"${CURRENT_VERSION}\"/version = \"${NEW_VERSION}\"/" src-tauri/Cargo.toml

            # 更新 tauri.conf.json
            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json', 'utf8'));
              conf.version = '${NEW_VERSION}';
              fs.writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            "

            # 提交版本更新
            git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
            git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]" || true
            git push origin HEAD || true

            # 创建并推送 tag
            git tag "v${NEW_VERSION}" || true
            git push origin "v${NEW_VERSION}" || true
          fi

          # 设置输出
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "release_name=B站账号管理工具 v${NEW_VERSION}" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS Apple Silicon'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS Intel'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安装 Rust (macOS)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 安装 Rust (其他平台)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装前端依赖
        run: npm ci

      - name: 构建应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag_name }}
          releaseName: ${{ needs.version.outputs.release_name }}
          releaseBody: |
            ## 更新内容

            本次更新包含以下改进：

            ### 自动生成的发布版本

            **安装包说明：**
            - `.msi` - Windows 安装包
            - `.exe` - Windows 可执行文件
            - `.dmg` - macOS 安装包
            - `.AppImage` - Linux 可执行文件
            - `.deb` - Linux Debian 安装包

            **支持的功能：**
            - B站扫码登录
            - 自动回复评论
            - 自动回复私信
            - 粉丝关注自动回复

            ---
            发布于 ${{ github.event.head_commit.timestamp }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-release-notes:
    needs: [version, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: 生成变更日志
        id: changelog
        run: |
          # 获取上一个 tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### 变更日志 (${PREVIOUS_TAG} -> ${{ needs.version.outputs.tag_name }})" > CHANGELOG_TMP.md
            echo "" >> CHANGELOG_TMP.md
            git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD >> CHANGELOG_TMP.md
          else
            echo "### 初始发布" > CHANGELOG_TMP.md
            echo "" >> CHANGELOG_TMP.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG_TMP.md
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG_TMP.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 更新 Release 说明
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.tag_name }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ---

            **全平台安装包已就绪**

            | 平台 | 文件类型 |
            |------|----------|
            | Windows | `.msi`, `.exe` |
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux | `.AppImage`, `.deb` |
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
