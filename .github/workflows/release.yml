name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: '版本号迭代方式'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 计算新版本号
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "当前版本: $CURRENT_VERSION"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NEW_VERSION=${GITHUB_REF#refs/tags/v}
            echo "使用 tag 版本: $NEW_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              BUMP_TYPE="${{ github.event.inputs.version_bump }}"
            else
              COMMIT_MSG=$(git log -1 --pretty=%B)
              if echo "$COMMIT_MSG" | grep -qE "(BREAKING CHANGE|major:|\!:)"; then
                BUMP_TYPE="major"
              elif echo "$COMMIT_MSG" | grep -qE "(feat:|feature:|minor:)"; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi
            fi

            echo "迭代方式: $BUMP_TYPE"

            case $BUMP_TYPE in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "新版本: $NEW_VERSION"

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            sed -i "s/^version = \"${CURRENT_VERSION}\"/version = \"${NEW_VERSION}\"/" src-tauri/Cargo.toml

            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('./src-tauri/tauri.conf.json', 'utf8'));
              conf.version = '${NEW_VERSION}';
              fs.writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            "

            git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
            git commit -m "chore(release): bump version to ${NEW_VERSION} [skip ci]" || true
            git push origin HEAD || true

            git tag "v${NEW_VERSION}" || true
            git push origin "v${NEW_VERSION}" || true
          fi

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "release_name=B站账号管理工具 v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: 生成变更日志文件
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          cat > /tmp/changelog.md << 'CHANGELOG_EOF'
          ## 更新内容

          CHANGELOG_EOF
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "**变更范围**: ${PREVIOUS_TAG} → ${{ steps.version.outputs.tag_name }}" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD >> /tmp/changelog.md
          else
            echo "**初始发布**" >> /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" >> /tmp/changelog.md
          fi
          echo "" >> /tmp/changelog.md
          echo "---" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "### 全平台安装包" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "| 平台 | 文件类型 |" >> /tmp/changelog.md
          echo "|------|----------|" >> /tmp/changelog.md
          echo "| Windows | .msi, .exe |" >> /tmp/changelog.md
          echo "| macOS (Apple Silicon) | .dmg |" >> /tmp/changelog.md
          echo "| macOS (Intel) | .dmg |" >> /tmp/changelog.md
          echo "| Linux | .AppImage, .deb |" >> /tmp/changelog.md

      - name: 上传变更日志
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: /tmp/changelog.md

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS Apple Silicon'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS Intel'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: 安装 Rust (macOS)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 安装 Rust (其他平台)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装前端依赖
        run: npm ci

      - name: 构建应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.version.outputs.tag_name }}
          releaseName: ${{ needs.version.outputs.release_name }}
          releaseBody: "构建进行中… 稍后将更新变更日志"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  release-notes:
    needs: [version, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - run: |
          echo "所有平台构建完成，正在更新 Release 变更日志..."

      - name: 下载变更日志
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: /tmp

      - name: 更新 Release 说明
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ needs.version.outputs.tag_name }}"
          cat /tmp/changelog.md
          gh release edit "$TAG_NAME" --notes-file /tmp/changelog.md --repo ${{ github.repository }}
